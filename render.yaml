# Render Blueprint — one-click deploy of mshpit.com.
# In Render: New ▸ Blueprint ▸ pick this repo. It provisions the web service,
# a PERSISTENT DISK for the SQLite DB (critical — without it the database is
# wiped on every deploy), Node 24, and the production env. Set ADMIN_PASSWORD
# when prompted (it's marked sync:false so it isn't stored in git).
services:
  - type: web
    name: mshpit
    runtime: node
    plan: starter                      # $7/mo; has persistent disk support
    buildCommand: npm ci && npm run build:web
    startCommand: node server/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: pit-data
      mountPath: /data                 # PIT_DATA_DIR points here → pit.db survives deploys
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      - key: PIT_DATA_DIR
        value: /data
      - key: ADMIN_EMAIL
        value: adamgadishaw@gmail.com
      - key: ADMIN_PASSWORD
        sync: false                    # you enter this in the Render dashboard
      - key: EXPO_PUBLIC_GOOGLE_MAPS_KEY
        # Referrer-locked (mshpit.com/*) + Maps Static API only. Safe to commit:
        # EXPO_PUBLIC_* vars are inlined into the public web bundle on every build,
        # so this key is shipped to every visitor regardless — sync:false only made
        # deploys silently fall back to the drawn map when the dashboard was blank.
        value: AIzaSyBbH03hTjAwT603T0pWew-2L9aaBVlGFXw

  # Durable, hosted scraper. Runs ONE pipeline cycle on a schedule (roster growth +
  # Spotify enrichment + Ticketmaster tour dates), then commits + pushes the
  # refreshed catalog to master — which trips the web service's autoDeploy above,
  # shipping fresh data live with nobody in the loop. Set the four sync:false env
  # vars in the Render dashboard (Spotify pair, Ticketmaster key, and a GitHub PAT
  # with Contents: read/write). See scripts/cron-scrape.mjs.
  - type: cron
    name: pit-catalog-refresh
    runtime: node
    schedule: "0 8 * * *"              # daily, 08:00 UTC (adjust as you like)
    buildCommand: npm ci
    startCommand: node scripts/cron-scrape.mjs
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: ARTIST_TARGET
        value: "1500"                  # keep growing the roster (MusicBrainz, keyless)
      - key: TOURDATE_LIMIT
        value: "150"                   # artists polled for tour dates per run
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: TICKETMASTER_KEY
        sync: false                    # free at developer.ticketmaster.com
      - key: BANDSINTOWN_APP_ID
        sync: false                    # self-assigned string; developer.bandsintown.com
      - key: GITHUB_TOKEN
        sync: false                    # fine-grained PAT, Contents: read/write on the repo
