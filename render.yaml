# Render Blueprint — one-click deploy of mshpit.com.
# In Render: New ▸ Blueprint ▸ pick this repo. It provisions the web service,
# a PERSISTENT DISK for the SQLite DB (critical — without it the database is
# wiped on every deploy), Node 24, and the production env. Set ADMIN_PASSWORD
# when prompted (it's marked sync:false so it isn't stored in git).
services:
  - type: web
    name: mshpit
    runtime: node
    plan: starter                      # $7/mo; has persistent disk support
    # Build must NOT run the test suite: the persistent disk is not mounted during
    # Render builds, so anything importing server/db.js (which opens SQLite at
    # PIT_DATA_DIR=/data) dies instantly and the deploy fails in under a minute.
    # Tests run locally / pre-commit via `npm run check`.
    buildCommand: npm ci && npm run build:web
    startCommand: node server/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: pit-data
      mountPath: /data                 # PIT_DATA_DIR points here → pit.db survives deploys
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      - key: PIT_DATA_DIR
        value: /data
      - key: PUBLIC_ORIGIN
        value: https://www.mshpit.com
      - key: ADMIN_EMAIL
        value: adamgadishaw@gmail.com
      - key: ADMIN_PASSWORD
        sync: false                    # you enter this in the Render dashboard
      # In-app playback resolves each song to a YouTube video via the YouTube Data
      # API and caches the id in SQLite forever (the free quota is ~100 searches/day,
      # so the cache fills gradually — top artists first). Get a key at
      # console.cloud.google.com → enable "YouTube Data API v3" → Credentials → API
      # key. Without it, playback falls back to Deezer 30s previews for everyone.
      - key: YOUTUBE_API_KEY
        sync: false
      # Password recovery is disabled gracefully until both values are set. Never
      # log or expose reset links as a substitute for transactional email.
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      # Durable photos upload directly to an S3-compatible bucket using a
      # short-lived signed PUT. Keep credentials server-side; MEDIA_PUBLIC_BASE_URL
      # is the CDN/public bucket base where an uploaded object key is readable.
      # Example R2 endpoint: https://<account-id>.r2.cloudflarestorage.com
      - key: MEDIA_ENDPOINT
        sync: false
      - key: MEDIA_BUCKET
        sync: false
      - key: MEDIA_REGION
        sync: false
      - key: MEDIA_ACCESS_KEY_ID
        sync: false
      - key: MEDIA_SECRET_ACCESS_KEY
        sync: false
      - key: MEDIA_PUBLIC_BASE_URL
        sync: false
      - key: EXPO_PUBLIC_GOOGLE_MAPS_KEY
        # Referrer-locked (mshpit.com/*) + Maps Static API only. Safe to commit:
        # EXPO_PUBLIC_* vars are inlined into the public web bundle on every build,
        # so this key is shipped to every visitor regardless — sync:false only made
        # deploys silently fall back to the drawn map when the dashboard was blank.
        value: AIzaSyBbH03hTjAwT603T0pWew-2L9aaBVlGFXw
      # Tour dates are scraped IN-PROCESS into SQLite (server/tourdates.js) on a
      # timer and served via GET /api/tourdates — no cron, no git push, no redeploy.
      # Set these (at least one) in the dashboard to turn scraping on.
      - key: TICKETMASTER_KEY
        sync: false                    # free: developer.ticketmaster.com (Consumer Key only)
      - key: BANDSINTOWN_APP_ID
        sync: false                    # self-assigned string; developer.bandsintown.com
      - key: TOURDATE_LIMIT
        value: "150"                   # top artists polled per refresh
      - key: TOURDATE_REFRESH_H
        value: "12"                    # hours between refreshes
      - key: TOURDATE_CITY_LIMIT
        value: "50"                    # most-used member cities refreshed per pass

  # NOTE: the old git-push cron ("pit-catalog-refresh") is retired — the in-process
  # scheduler above replaces it for tour dates (no token, no redeploy, live instantly).
  # To grow the ARTIST roster (a bundled file), run `npm run pipeline` locally and
  # push, or re-add a cron later if you want it automated.
